<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — AtlasDelta</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .error-wrap {
      max-width: 520px;
      width: 100%;
    }

    /* ── Glitchy 404 number ── */
    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(6rem, 22vw, 10rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -.04em;
      color: transparent;
      -webkit-text-stroke: 1px var(--border2);
      position: relative;
      display: inline-block;
      margin-bottom: 4px;
      user-select: none;
    }

    .error-code::before {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--accent);
      opacity: .08;
      transform: translate(3px, 2px);
      -webkit-text-stroke: 0;
    }

    /* ── Kicker ── */
    .error-kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--txt3);
      margin-bottom: 10px;
    }

    /* ── Headline ── */
    .error-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #e4e6f0 30%, #52566a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .error-title em { font-style: italic; }

    /* ── Sub ── */
    .error-sub {
      font-size: 14.5px;
      color: var(--txt2);
      max-width: 380px;
      margin-bottom: 28px;
      line-height: 1.65;
    }

    /* ── Diagnostic box ── */
    .error-diag {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--txt3);
      line-height: 1.9;
    }
    .error-diag .diag-line { display: flex; gap: 10px; }
    .error-diag .diag-key  { color: var(--txt3); min-width: 100px; }
    .error-diag .diag-val  { color: var(--txt2); }
    .error-diag .diag-val--err { color: #f87171; }
    .error-diag .diag-val--ok  { color: var(--accent); }

    /* ── CTA ── */
    .error-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(74,222,128,.1);
      border: 1px solid rgba(74,222,128,.35);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 9px;
      text-decoration: none;
      transition: background .2s, border-color .2s;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: rgba(74,222,128,.18);
      border-color: rgba(74,222,128,.6);
      color: var(--accent);
      text-decoration: none;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--txt3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 9px;
      text-decoration: none;
      transition: border-color .2s, color .2s;
      cursor: pointer;
    }
    .btn-ghost:hover {
      border-color: var(--border2);
      color: var(--txt2);
      text-decoration: none;
    }

    /* ── Logo watermark ── */
    .error-watermark {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--txt3);
      opacity: .45;
      pointer-events: none;
      user-select: none;
    }

    /* ── Scan-line grid accent (decorative) ── */
    .error-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .18;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
    }
  </style>
</head>

<body>

  <div class="error-grid"></div>

  <div class="error-page">
    <div class="error-wrap">

      <div class="error-kicker">// Error de navegación:</div>
      <div class="error-code">404</div>

      <h1 class="error-title">Página <em>no encontrada</em></h1>
      <p class="error-sub">
        La ruta que intentaste alcanzar no existe en este sistema.
        Puede haber sido movida, eliminada, o quizás nunca existió.
      </p>

      <div class="error-diag">
        <div class="diag-line">
          <span class="diag-key">STATUS</span>
          <span class="diag-val diag-val--err">404 NOT_FOUND</span>
        </div>
        <div class="diag-line">
          <span class="diag-key">ORIGIN</span>
          <span class="diag-val" id="diag-origin">—</span>
        </div>
        <div class="diag-line">
          <span class="diag-key">TIMESTAMP</span>
          <span class="diag-val" id="diag-time">—</span>
        </div>
        <div class="diag-line">
          <span class="diag-key">INDEX</span>
          <span class="diag-val diag-val--ok">ONLINE</span>
        </div>
      </div>

      <div class="error-actions">
        <a href="index.html" class="btn-primary">
          ⬡ &nbsp;Volver al índice
        </a>
        <a href="javascript:history.back()" class="btn-ghost">
          ← &nbsp;Página anterior
        </a>
      </div>

    </div>
  </div>

  <div class="error-watermark">Atlas∆ · 404</div>

  <script>
    // Populate diagnostic info
    const origin = document.getElementById('diag-origin');
    const timeEl = document.getElementById('diag-time');

    origin.textContent = window.location.pathname || '/';

    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    timeEl.textContent =
      `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ` +
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} UTC${now.getTimezoneOffset() <= 0 ? '+' : '-'}${pad(Math.abs(now.getTimezoneOffset()/60))}`;
  </script>

</body>
</html>
